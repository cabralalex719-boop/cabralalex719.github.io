<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso Importante</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50; /* Um fundo mais escuro para dar destaque */
            margin: 0;
            color: white;
        }
        .alerta-container {
            background: #ecf0f1;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(191, 48, 122, 0.5);
            text-align: center;
            color: #1a2e9f; /* Vermelho para o alerta */
            max-width: 80%;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            text-transform: uppercase;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 5px solid #0b0909;
        }
    </style>
</head>
<body>

    <div class="alerta-container">
        <h1>Você podia ter caído em um golpe!</h1>
        
        <img src="macaco.jpg" alt="Imagem de um macaco">
        
        <p style="color: #d44848; margin-top: 15px;">Fique atento aos links que você clica!</p>
    </div>

</body>
</html>
